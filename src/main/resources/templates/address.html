<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css">
    <title>Address</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>
<div class="container py-4">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-lg-3 col-md-4 mb-4">
            <div th:replace="~{fragments/userSidebar :: userSidebar}"></div>
        </div>

        <div class="col-lg-9 col-md-8">
            <div class="bg-white rounded p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0">Địa Chỉ Của Tôi</h4>
                    <button class="btn btn-danger" data-toggle="modal" data-target="#addAddressModal">
                        + Thêm Địa Chỉ Mới
                    </button>
                </div>

                <!-- Success Message -->
                <div th:if="${success}" class="alert alert-success" role="alert">
                    <span th:text="${success}"></span>
                </div>

                <!-- Address List -->
                <div class="address-list">
                    <th:block th:each="address :  ${addresses}">
                        <div class="card mb-3">
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-8">
                                        <div class="d-flex align-items-center mb-2">
                                            <h6 class="mb-0 mr-3" th:text="${address.receiverName}"></h6>
                                            <span class="text-muted">|</span>
                                            <span class="ml-3 text-muted" th:text="${address.receiverPhone}"></span>
                                        </div>
                                        <p class="text-muted mb-2" th:text="${address.address}"></p>
                                        <span th:if="${address.isDefault == 1}" class="badge badge-danger">Mặc Định</span>
                                    </div>
                                    <div class="col-md-4 text-right">
                                        <button class="btn btn-sm btn-outline-primary mb-2 btn-update"
                                                data-toggle="modal"
                                                data-target="#updateAddressModal"
                                                th:attr="data-id=${address.addressId},data-name=${address.receiverName},data-phone=${address.receiverPhone},data-address=${address.address},data-default=${address.isDefault}">
                                            Cập Nhật
                                        </button>
                                        <br/>
                                        <form th:if="${address.isDefault == 0}"
                                              th:action="@{/user/account/address/delete/{id}(id=${address.addressId})}"
                                              method="post"
                                              class="d-inline"
                                              onsubmit="return confirm('Bạn có chắc muốn xóa địa chỉ này? ')">
                                            <button type="submit" class="btn btn-sm btn-outline-danger mb-2">Xóa</button>
                                        </form>

                                        <form th:if="${address.isDefault == 0}"
                                              th:action="@{/user/account/address/set-default/{id}(id=${address.addressId})}"
                                              method="post"
                                              class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-outline-success mb-2">Thiết Lập Mặc Định</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </th:block>
                </div>

                <!-- Add Address Modal -->
                <div class="modal fade" id="addAddressModal" tabindex="-1" role="dialog">
                    <div class="modal-dialog" role="document">
                        <form th:action="@{/user/account/address/create}" th:object="${addressForm}" method="post" class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Địa Chỉ Mới</h5>
                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>

                            <div class="modal-body">
                                <div class="form-group">
                                    <label>
                                        <input th:field="*{receiverName}" class="form-control" placeholder="Họ và tên"/>
                                    </label>
                                    <small class="text-danger" th:if="${#fields.hasErrors('receiverName')}" th:errors="*{receiverName}"></small>
                                </div>

                                <div class="form-group">
                                    <label>
                                        <input th:field="*{receiverPhone}" class="form-control" placeholder="Số điện thoại"/>
                                    </label>
                                    <small class="text-danger" th:if="${#fields.hasErrors('receiverPhone')}" th:errors="*{receiverPhone}"></small>
                                </div>

                                <div class="form-group">
                                    <label>
                                        <textarea th:field="*{address}" class="form-control" rows="3" placeholder="Địa chỉ"></textarea>
                                    </label>
                                    <small class="text-danger" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></small>
                                </div>

                                <div class="form-check">
                                    <input th:field="*{isDefault}" class="form-check-input" type="checkbox" id="isDefaultAdd"/>
                                    <label class="form-check-label" for="isDefaultAdd">
                                        Đặt làm địa chỉ mặc định
                                    </label>
                                </div>
                            </div>

                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-danger">Hoàn Thành</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Update Address Modal -->
                <div class="modal fade" id="updateAddressModal" tabindex="-1" role="dialog">
                    <div class="modal-dialog" role="document">
                        <form th:action="@{/user/account/address/update}" method="post" class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Cập Nhật Địa Chỉ</h5>
                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>

                            <input type="hidden" name="addressId" id="updateId"/>

                            <div class="modal-body">
                                <div class="form-group">
                                    <label for="updateName">Họ và tên</label>
                                    <input type="text" name="receiverName" id="updateName" class="form-control"/>
                                </div>

                                <div class="form-group">
                                    <label for="updatePhone">Số điện thoại</label>
                                    <input type="text" name="receiverPhone" id="updatePhone" class="form-control"/>
                                </div>

                                <div class="form-group">
                                    <label for="updateAddress">Địa chỉ</label>
                                    <textarea name="address" id="updateAddress" class="form-control" rows="3"></textarea>
                                </div>

                                <div class="form-check">
                                    <input type="checkbox" name="isDefault" id="updateDefault" class="form-check-input" value="true"/>
                                    <label class="form-check-label" for="updateDefault">
                                        Đặt làm địa chỉ mặc định
                                    </label>
                                </div>
                            </div>

                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-danger">Cập Nhật</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Load jQuery TRƯỚC -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>

<!-- Custom Script -->
<script>
    $(document).ready(function() {
        $('#updateAddressModal').on('show.bs.modal', function (e) {
            var btn = $(e.relatedTarget);
            $('#updateId').val(btn.data('id'));
            $('#updateName').val(btn.data('name'));
            $('#updatePhone').val(btn.data('phone'));
            $('#updateAddress').val(btn.data('address'));
            $('#updateDefault').prop('checked', btn.data('default') == 1);
        });
    });
</script>
</body>
</html>
