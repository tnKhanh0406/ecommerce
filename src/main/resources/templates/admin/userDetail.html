<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>Chi Tiết Người Dùng</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<div class="container-fluid my-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="bg-white rounded shadow-sm p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="font-weight-bold mb-0">Chi Tiết Người Dùng</h3>
                    <a href="/admin/users" class="btn btn-secondary btn-sm">← Quay Lại</a>
                </div>

                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <strong>Thành công!</strong> <span th:text="${successMessage}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Lỗi!</strong> <span th:text="${errorMessage}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <!-- User Information -->
                <div class="row mb-4 pb-4 border-bottom">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="font-weight-bold text-muted">ID</label>
                            <p class="form-control-plaintext" th:text="${user.id}">1</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="font-weight-bold text-muted">Username</label>
                            <p class="form-control-plaintext" th:text="${user.username}">john_doe</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="font-weight-bold text-muted">Tên Người Dùng</label>
                            <p class="form-control-plaintext" th:text="${user.fullName}">John Doe</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="font-weight-bold text-muted">Email</label>
                            <p class="form-control-plaintext" th:text="${user.email}">john@example.com</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="font-weight-bold text-muted">Số Điện Thoại</label>
                            <p class="form-control-plaintext" th:text="${user.phoneNumber}">0123456789</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="font-weight-bold text-muted">Vai Trò</label>
                            <p class="form-control-plaintext">
                                <span th:if="${user.role == 'CUSTOMER'}" class="badge badge-info">Khách Hàng</span>
                                <span th:if="${user.role == 'SELLER'}" class="badge badge-warning">Người Bán</span>
                                <span th:if="${user.role == 'ADMIN'}" class="badge badge-danger">Quản Trị Viên</span>
                            </p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="font-weight-bold text-muted">Ngày Tạo</label>
                            <p class="form-control-plaintext" th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm:ss')}">01/01/2024</p>
                        </div>
                    </div>
                </div>

                <!-- Status Update Form -->
                <div class="row">
                    <div class="col-md-12">
                        <h5 class="font-weight-bold mb-3">Cập Nhật Trạng Thái</h5>
                        <form th:action="@{/admin/users/{id}/status(id=${user.id})}" method="post" class="row">
                            <div class="col-md-8">
                                <select name="status" class="form-control" required>
                                    <option value="">-- Chọn Trạng Thái --</option>
                                    <option th:each="status : ${statuses}" 
                                            th:value="${status}"
                                            th:text="${status.label}"
                                            th:selected="${user.status == status}">
                                        Option
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button type="submit" class="btn btn-danger btn-block">💾 Lưu Thay Đổi</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Current Status Badge -->
                <div class="row mt-4 pt-4 border-top">
                    <div class="col-md-12">
                        <p class="text-muted">
                            <strong>Trạng thái hiện tại:</strong>
                            <span th:if="${user.status == 'ACTIVE'}" class="badge badge-success">Hoạt Động</span>
                            <span th:if="${user.status == 'INACTIVE'}" class="badge badge-secondary">Không Hoạt Động</span>
                            <span th:if="${user.status == 'BANNED'}" class="badge badge-danger">Bị Chặn</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
