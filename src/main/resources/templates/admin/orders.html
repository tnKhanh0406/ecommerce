<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin-sidebar.css">
    <title>Quản Lý Đơn Hàng</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/adminSidebar :: adminSidebar(activeMenu='orders')}"></div>

<div class="container-fluid my-4 admin-content">
    <div class="row">
        <div class="col-md-12">
            <div class="bg-white rounded shadow-sm p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="font-weight-bold mb-0">Quản Lý Đơn Hàng</h3>
                </div>

                <form th:action="@{/admin/orders}" method="get" class="mb-4">
                    <div class="row">
                        <div class="col-md-6 mb-2 mb-md-0">
                            <input type="text" class="form-control" name="search"
                                   placeholder="Tìm theo mã đơn, shop, người nhận, username, email"
                                   th:value="${search}">
                        </div>
                        <div class="col-md-3 mb-2 mb-md-0">
                            <select class="form-control" name="status">
                                <option value="" th:selected="${currentStatus == null}">Tất cả trạng thái</option>
                                <option th:each="status : ${statuses}"
                                        th:value="${status.name()}"
                                        th:text="${status.name()}"
                                        th:selected="${currentStatus != null and currentStatus.name() == status.name()}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn btn-danger btn-block">Lọc đơn hàng</button>
                        </div>
                    </div>
                </form>

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <strong>Thành công!</strong> <span th:text="${successMessage}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Lỗi!</strong> <span th:text="${errorMessage}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="bg-light">
                        <tr>
                            <th>Mã Đơn</th>
                            <th>Khách Hàng</th>
                            <th>Shop</th>
                            <th>Trạng Thái</th>
                            <th>Thanh Toán</th>
                            <th>Tổng Tiền</th>
                            <th>Ngày Tạo</th>
                            <th>Thao Tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="order : ${orders}">
                            <td class="font-weight-bold" th:text="${order.id}"></td>
                            <td>
                                <div class="font-weight-bold" th:text="${order.receiverName}"></div>
                                <div class="small text-muted" th:text="${order.receiverPhone}"></div>
                            </td>
                            <td th:text="${order.shopName}"></td>
                            <td>
                                <span class="badge badge-pill"
                                      th:classappend="${order.orderStatus == 'PENDING' ? ' badge-warning' : (order.orderStatus == 'CONFIRMED' ? ' badge-info' : (order.orderStatus == 'SHIPPING' ? ' badge-primary' : (order.orderStatus == 'COMPLETED' ? ' badge-success' : ' badge-danger')))}"
                                      th:text="${order.orderStatus}"></span>
                            </td>
                            <td th:text="${order.paymentStatus}"></td>
                            <td class="font-weight-bold" th:text="'₫' + ${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')}"></td>
                            <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-sm btn-primary">Xem chi tiết</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="8" class="text-center text-muted py-4">Không có đơn hàng phù hợp</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
