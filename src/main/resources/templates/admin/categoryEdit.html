<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin-sidebar.css">
    <title>Chỉnh Sửa Danh Mục</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/adminSidebar :: adminSidebar(activeMenu='categories')}"></div>

<div class="container-fluid my-4 admin-content">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="bg-white rounded shadow-sm p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="font-weight-bold mb-0">Chỉnh Sửa Danh Mục</h3>
                    <a href="/admin/categories" class="btn btn-secondary btn-sm">← Quay Lại</a>
                </div>

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <strong>Thành công!</strong> <span th:text="${successMessage}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Lỗi!</strong> <span th:text="${errorMessage}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <form th:action="@{/admin/categories/{id}/edit(id=${category.id})}" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label class="font-weight-bold">Tên Danh Mục</label>
                        <input type="text" name="name" class="form-control" th:value="${category.name}" required>
                    </div>
                    <div class="form-group">
                        <label class="font-weight-bold">Slug</label>
                        <input type="text" name="slug" class="form-control" th:value="${category.slug}" required>
                    </div>
                    <div class="form-group">
                        <label class="font-weight-bold">Ảnh Danh Mục</label>
                        <div class="mb-2" th:if="${category.imageUrl != null and !#strings.isEmpty(category.imageUrl)}">
                            <img th:src="${category.imageUrl}" alt="Category image"
                                 style="width: 120px; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #dee2e6;">
                        </div>
                        <input type="file" name="image" class="form-control-file" accept="image/*">
                        <small class="form-text text-muted">Để trống nếu không muốn thay đổi ảnh hiện tại.</small>
                    </div>
                    <div class="form-group">
                        <label class="font-weight-bold">Danh Mục Cha</label>
                        <select name="parentId" class="form-control">
                            <option value="">-- Danh mục gốc --</option>
                            <option th:each="parent : ${parentCategories}"
                                    th:value="${parent.id}"
                                    th:text="${parent.name}"
                                    th:selected="${category.parentId != null and category.parentId == parent.id}">
                                Parent
                            </option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-danger">💾 Lưu Thay Đổi</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
