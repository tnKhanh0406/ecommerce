<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin-sidebar.css">
    <title>Quản Lý Shop</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/adminSidebar :: adminSidebar(activeMenu='sellers')}"></div>

<div class="container-fluid my-4 admin-content">
    <div class="row">
        <div class="col-md-12">
            <div class="bg-white rounded shadow-sm p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="font-weight-bold mb-0">Quản Lý Shop</h3>
                </div>

                <!-- Filter & Search Form -->
                <form th:action="@{/admin/sellers}" method="get" class="mb-4">
                    <div class="row">
                        <div class="col-md-5">
                            <input type="text" class="form-control" name="search" placeholder="Tìm kiếm theo tên shop, chủ shop, email"
                                   th:value="${search}">
                        </div>
                        <div class="col-md-4">
                            <select name="status" class="form-control">
                                <option value="">-- Tất cả Trạng Thái --</option>
                                <option th:each="s : ${statuses}" 
                                        th:value="${s}"
                                        th:text="${s.toString() == 'ACTIVE' ? 'Đã Phê Duyệt' : (s.toString() == 'INACTIVE' ? 'Chờ Phê Duyệt' : 'Bị Từ Chối')}"
                                        th:selected="${selectedStatus == s}">
                                    Option
                                </option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn btn-danger btn-block">🔍 Lọc & Tìm</button>
                        </div>
                    </div>
                </form>

                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <strong>Thành công!</strong> <span th:text="${successMessage}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Lỗi!</strong> <span th:text="${errorMessage}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <!-- Shops Table -->
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="bg-light">
                        <tr>
                            <th>ID</th>
                            <th>Logo</th>
                            <th>Tên Shop</th>
                            <th>Chủ Shop</th>
                            <th>Email</th>
                            <th>Trạng Thái</th>
                            <th>Đánh Giá</th>
                            <th>Ngày Tạo</th>
                            <th>Thao Tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="shop : ${shops}">
                            <td th:text="${shop.id}">1</td>
                            <td>
                                <img th:src="${shop.logoUrl}" alt="Logo" class="rounded" style="width: 40px; height: 40px; object-fit: cover;"/>
                            </td>
                            <td class="font-weight-bold" th:text="${shop.shopName}">Shop Name</td>
                            <td th:text="${shop.ownerName}">Owner Name</td>
                            <td th:text="${shop.ownerEmail}">owner@email.com</td>
                            <td>
                                <span th:if="${shop.status != null and shop.status.toString() == 'ACTIVE'}" class="badge badge-success">✅ Đã Phê Duyệt</span>
                                <span th:if="${shop.status != null and shop.status.toString() == 'INACTIVE'}" class="badge badge-warning">⏳ Chờ Phê Duyệt</span>
                                <span th:if="${shop.status != null and shop.status.toString() == 'BLOCKED'}" class="badge badge-danger">❌ Bị Từ Chối</span>
                            </td>
                            <td>
                                <span class="badge badge-info" th:text="${shop.rating}">4.5</span>
                            </td>
                            <td th:text="${#temporals.format(shop.createdAt, 'dd/MM/yyyy')}">01/01/2024</td>
                            <td>
                                <a th:href="@{/admin/sellers/{id}(id=${shop.id})}" class="btn btn-sm btn-primary">👁️ Xem</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(shops)}">
                            <td colspan="9" class="text-center text-muted py-4">Không tìm thấy shop</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <nav aria-label="Page navigation" th:if="${totalPages > 1}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/sellers(page=0, search=${search}, status=${selectedStatus}, size=${pageSize})}">Đầu tiên</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/sellers(page=${currentPage - 1}, search=${search}, status=${selectedStatus}, size=${pageSize})}">Trước</a>
                        </li>

                        <li class="page-item active" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${currentPage == i} ? 'active' : ''">
                            <a class="page-link" th:href="@{/admin/sellers(page=${i}, search=${search}, status=${selectedStatus}, size=${pageSize})}" th:text="${i + 1}">1</a>
                        </li>

                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/sellers(page=${currentPage + 1}, search=${search}, status=${selectedStatus}, size=${pageSize})}">Sau</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/sellers(page=${totalPages - 1}, search=${search}, status=${selectedStatus}, size=${pageSize})}">Cuối cùng</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
