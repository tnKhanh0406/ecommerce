<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin-sidebar.css">
    <title>Quản Lý Danh Mục</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/adminSidebar :: adminSidebar(activeMenu='categories')}"></div>

<div class="container-fluid my-4 admin-content">
    <div class="row">
        <div class="col-md-12">
            <div class="bg-white rounded shadow-sm p-4 mb-4">
                <h3 class="font-weight-bold mb-4">Tạo Danh Mục Mới</h3>

                <form th:action="@{/admin/categories}" method="post" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label class="font-weight-bold">Tên Danh Mục</label>
                            <input type="text" name="name" class="form-control" placeholder="Ví dụ: Điện thoại" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="font-weight-bold">Slug (tuỳ chọn)</label>
                            <input type="text" name="slug" class="form-control" placeholder="dien-thoai">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="font-weight-bold">Danh Mục Cha</label>
                            <select name="parentId" class="form-control">
                                <option value="">-- Danh mục gốc --</option>
                                <option th:each="parent : ${parentCategories}"
                                        th:value="${parent.id}"
                                        th:text="${parent.name}">
                                    Parent
                                </option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="font-weight-bold">Ảnh Danh Mục</label>
                            <input type="file" name="image" class="form-control-file" accept="image/*">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger">➕ Tạo Danh Mục</button>
                </form>
            </div>

            <div class="bg-white rounded shadow-sm p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="font-weight-bold mb-0">Danh Sách Danh Mục</h3>
                </div>

                <form th:action="@{/admin/categories}" method="get" class="mb-4">
                    <div class="row">
                        <div class="col-md-4 mb-2">
                            <input type="text" class="form-control" name="search" placeholder="Tìm theo tên hoặc slug"
                                   th:value="${search}">
                        </div>
                        <div class="col-md-4 mb-2">
                            <select name="parentId" class="form-control">
                                <option value="">-- Tất cả parent id --</option>
                                <option value="-1" th:selected="${selectedParentId != null and selectedParentId == -1}">-- Danh mục gốc --</option>
                                <option th:each="parent : ${parentCategories}"
                                        th:value="${parent.id}"
                                        th:text="${parent.id + ' - ' + parent.name}"
                                        th:selected="${selectedParentId != null and selectedParentId == parent.id}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-2 mb-2">
                            <button type="submit" class="btn btn-outline-danger btn-block">🔍 Tìm</button>
                        </div>
                    </div>
                </form>

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <strong>Thành công!</strong> <span th:text="${successMessage}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Lỗi!</strong> <span th:text="${errorMessage}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="bg-light">
                        <tr>
                            <th>ID</th>
                            <th>Ảnh</th>
                            <th>Tên Danh Mục</th>
                            <th>Slug</th>
                            <th>Parent ID</th>
                            <th>Thao Tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="category : ${categories}">
                            <td th:text="${category.id}">1</td>
                            <td>
                                <img th:if="${category.imageUrl != null and !#strings.isEmpty(category.imageUrl)}"
                                     th:src="${category.imageUrl}"
                                     alt="Category image"
                                     style="width: 64px; height: 64px; object-fit: cover; border-radius: 8px;">
                                <span th:if="${category.imageUrl == null or #strings.isEmpty(category.imageUrl)}" class="text-muted">Không có</span>
                            </td>
                            <td class="font-weight-bold" th:text="${category.name}">Điện thoại</td>
                            <td><code th:text="${category.slug}">dien-thoai</code></td>
                            <td>
                                <span th:if="${category.parentId != null}" th:text="${category.parentId}">10</span>
                                <span th:if="${category.parentId == null}" class="text-muted">ROOT</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/categories/{id}/edit(id=${category.id})}" class="btn btn-sm btn-primary mr-2">✏️ Sửa</a>
                                <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}" method="post" style="display: inline;">
                                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc muốn xóa danh mục này?')">🗑️ Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="6" class="text-center text-muted py-4">Không có danh mục</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
