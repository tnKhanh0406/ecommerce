<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css">
    <title>E-commerce</title>
</head>
<body class="bg-light">
    <!--    Category Section-->
    <div class="category-section bg-white py-4 mb-3">
        <div class="container">
            <h5 class="text-uppercase text-muted mb-3 pl-2">Danh Mục</h5>
            <div class="row">
                <th:block th:each="category :  ${topLevelCategories}">
                    <div class="col-6 col-sm-4 col-md-3 col-lg-2 mb-3">
                        <div class="card category-card h-100 text-center border-0 shadow-sm">
                            <div class="card-body p-3">
                                <img th:src="${category.getImageUrl()}" th:alt="${category.getName()}" class="img-fluid mb-2" style="max-width: 80px; height: 80px; object-fit: cover;"/>
                                <p class="card-text small mb-0 text-truncate" th:text="${category.getName()}"></p>
                            </div>
                        </div>
                    </div>
                </th:block>
            </div>
        </div>
    </div>

    <!--    Recommend Product Section-->
    <div class="recommend-product-section bg-white py-4 mb-4">
        <div class="container">
            <h5 class="text-uppercase text-muted mb-3 header-shopee">Gợi Ý Hôm Nay</h5>
            <div class="row">
                <th:block th:each="product : ${products}">
                    <div class="col-6 col-sm-4 col-md-3 col-lg-2 mb-3">
                        <div class="card product-card h-100 border">
                            <img th:src="${product. getImageUrl()}" th:alt="${product.getName()}" class="card-img-top" style="height: 180px; object-fit: cover;"/>
                            <div class="card-body p-2">
                                <p class="card-text small product-name mb-2" th:text="${product.getName()}"></p>
                                <p class="text-danger font-weight-bold mb-1">
                                    <span class="price-symbol">₫</span><span th:text="${product.getMinPrice()}"></span>
                                </p>
                                <p class="text-muted small mb-0" th:text="'Đã bán ' + ${product.getSoldCount()}"></p>
                            </div>
                        </div>
                    </div>
                </th:block>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
</body>
</html>
