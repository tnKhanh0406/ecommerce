<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>

    <link rel="stylesheet" href="/css/style.css">

<body>
    <!--    BreadCrumb-->
    <div class="container">
        <a th:href="@{'/'}">Shopee</a>

        </th:block>
    </div>
</body>
</html>
