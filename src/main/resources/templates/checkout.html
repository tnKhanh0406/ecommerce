<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/checkout.css">
    <title>Thanh Toán</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-4">
    <div class="row">
        <!-- Main Content -->
        <div class="col-lg-8">
            <form id="checkoutForm" method="post" action="/confirm-order">

                <!-- 1. Address Selection -->
                <div class="checkout-section mb-3">
                    <h5 class="section-title">📍 Địa Chỉ Giao Hàng</h5>
                    <div class="address-list">
                        <th:block th:if="${addresses != null and !addresses.isEmpty()}">
                            <th:block th:each="address : ${addresses}">
                                <div class="address-card mb-2">
                                    <input type="radio" name="addressId" th:value="${address.addressId}"
                                           th:id="'address-' + ${address.addressId}"
                                           th:checked="${address.isDefault == 1}" required>
                                    <label th:for="'address-' + ${address.addressId}" class="address-label">
                                        <div class="address-info">
                                            <strong th:text="${address.receiverName}">Name</strong>
                                            <span class="text-muted" th:text="'(' + ${address.receiverPhone} + ')'">Phone</span>
                                            <p class="mb-0 text-muted small" th:text="${address.address}">Address</p>
                                        </div>
                                    </label>
                                </div>
                            </th:block>
                        </th:block>
                    </div>
                </div>

                <!-- 2. Products Grouped by Shop -->
                <th:block th:each="shopEntry : ${itemsByShop}">
                    <div class="checkout-section mb-3">
                        <h5 class="section-title">🏪
                            <span th:text="${shopEntry.value[0].product.shopName}">Shop Name</span>
                        </h5>

                        <!-- Products List -->
                        <div class="products-list mb-3">
                            <th:block th:each="item : ${shopEntry.value}">
                                <div class="product-item p-3 border-bottom">
                                    <div class="row align-items-center">
                                        <div class="col-md-6">
                                            <img th:if="${item.product.images != null and !item.product.images.isEmpty()}"
                                                 th:src="${item.product.images[0].imageUrl}"
                                                 alt="Product"
                                                 class="product-image mr-3">
                                            <div class="d-inline-block">
                                                <strong th:text="${item.product.productName}">Product Name</strong>
                                                <p class="mb-0 text-muted small">
                                                    <span>Phân Loại: </span>
                                                    <th:block th:each="attr, iterStat : ${item.product.attributes}">
                                                        <span th:text="${attr.displayName}"></span>
                                                        <span th:if="${!iterStat.last}">, </span>
                                                    </th:block>
                                                </p>
                                            </div>
                                        </div>
                                        <div class="col-md-2 text-center">
                                            <span class="text-muted">₫</span>
                                            <span th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')}">
                                                Price
                                            </span>
                                        </div>
                                        <div class="col-md-2 text-center">
                                            <span th:text="${item.quantity}">Qty</span>
                                        </div>
                                        <div class="col-md-2 text-right">
                                            <strong class="text-danger">
                                                ₫<span th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'COMMA', 0, 'POINT')}">
                                                    Total
                                                </span>
                                            </strong>
                                        </div>
                                    </div>
                                </div>
                            </th:block>
                        </div>

                        <!-- Voucher Selection for this Shop -->
                        <div class="voucher-section mb-3">
                            <label class="font-weight-bold">Chọn Voucher của Shop</label>
                            <div class="voucher-list">
                                <th:block th:with="shopId=${shopEntry.key}, shopVouchers=${vouchersByShop.get(shopId)}">
                                    <th:block th:if="${shopVouchers != null and !shopVouchers.isEmpty()}">
                                        <th:block th:each="voucher : ${shopVouchers}">
                                            <th:block th:with="
                        isExpired=${T(java.time.LocalDateTime).now().isAfter(voucher.endAt)},
                        notStarted=${T(java.time.LocalDateTime).now().isBefore(voucher.startAt)},
                        outOfUsage=${voucher.usedCount >= voucher.usageLimit},
                        isAvailable=${!isExpired and !notStarted and !outOfUsage}">

                                                <div class="voucher-card mb-2"
                                                     th:classappend="${isAvailable ? 'available' : 'unavailable'}">
                                                    <input type="radio"
                                                           th:name="'shopVouchers[' + ${shopId} + ']'"
                                                           th:value="${voucher.id}"
                                                           th:id="'voucher-' + ${voucher.id}"
                                                           th:disabled="${!isAvailable}">
                                                    <label th:for="'voucher-' + ${voucher.id}"
                                                           class="voucher-label">
                                                        <div class="voucher-info">
                                                            <div class="voucher-left">
                                                                <strong th:text="${voucher.code}">CODE</strong>
                                                                <span class="voucher-discount">
                                            <span th:if="${voucher.discountType.toString() == 'PERCENTAGE'}">
                                                -<span th:text="${voucher.discountValue}">10</span>%
                                            </span>
                                            <span th:if="${voucher.discountType.toString() == 'FIXED'}">
                                                -₫<span th:text="${#numbers.formatDecimal(voucher.discountValue, 0, 'COMMA', 0, 'POINT')}">100k</span>
                                            </span>
                                        </span>
                                                            </div>
                                                            <div class="voucher-right">
                                        <span class="voucher-condition text-muted small">
                                            Đơn tối thiểu: ₫<span th:text="${#numbers.formatDecimal(voucher.minOrderValue, 0, 'COMMA', 0, 'POINT')}">50000</span>
                                        </span>
                                                                <span th:if="${!isAvailable}" class="unavailable-badge ml-2">
                                            <span th:if="${notStarted}">Chưa bắt đầu</span>
                                            <span th:if="${isExpired}">Hết hạn</span>
                                            <span th:if="${outOfUsage}">Hết lượt</span>
                                        </span>
                                                            </div>
                                                        </div>
                                                    </label>
                                                </div>
                                            </th:block>
                                        </th:block>
                                    </th:block>
                                    <div th:if="${shopVouchers == null or shopVouchers.isEmpty()}"
                                         class="text-muted text-center p-3">
                                        Không có voucher nào
                                    </div>
                                </th:block>
                            </div>
                        </div>
                    </div>
                </th:block>

                <!-- 3. Order Note -->
                <div class="checkout-section mb-3">
                    <h5 class="section-title">📝 Ghi Chú Đơn Hàng</h5>
                    <textarea name="note" class="form-control" rows="3"
                              placeholder="Ghi chú cho người bán (tùy chọn)..."></textarea>
                </div>

                <!-- 4. Payment Method -->
                <div class="checkout-section mb-3">
                    <h5 class="section-title">💳 Phương Thức Thanh Toán</h5>
                    <input type="text" name="paymentMethod" class="form-control" required
                           placeholder="VD: Thẻ tín dụng, Chuyển khoản, COD, v.v...">
                </div>

                <!-- Hidden fields for cart items -->
                <!-- Gửi cartItemIds dạng array -->
                <th:block th:each="item, iterStat : ${cartItems}">
                    <input type="hidden" th:name="'cartItemIds[' + ${iterStat.index} + ']'"
                           th:value="${item.id}">
                </th:block>

                <!-- Submit Buttons -->
                <div class="text-right mb-5">
                    <a href="/cart" class="btn btn-secondary btn-lg">← Quay Lại Giỏ</a>
                    <button type="submit" class="btn btn-danger btn-lg px-5">✓ Đặt Hàng</button>
                </div>
            </form>
        </div>

        <!-- Order Summary (Sidebar) -->
        <div class="col-lg-4">
            <div class="checkout-summary sticky-top">
                <h5>📦 Tóm Tắt Đơn Hàng</h5>

                <div class="summary-item">
                    <span>Tạm tính:</span>
                    <strong class="summary-value" id="subtotal">₫0</strong>
                </div>

                <div class="summary-item">
                    <span>Phí vận chuyển:</span>
                    <strong class="summary-value" id="shippingFee">₫25,000</strong>
                </div>

                <div class="summary-item" id="discountSection" style="display: none;">
                    <span>Giảm giá:</span>
                    <strong class="summary-value text-success" id="discount">-₫0</strong>
                </div>

                <hr>

                <div class="summary-total">
                    <span>Tổng cộng:</span>
                    <strong id="total">₫0</strong>
                </div>

                <div class="mt-3 text-muted small">
                    <p>✅ Sản phẩm: <span id="itemCount">0</span> mục</p>
                    <p>📍 Giao đến: <span id="selectedAddress">Chưa chọn</span></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/checkout.js"></script>
</body>
</html>
