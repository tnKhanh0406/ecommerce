<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/product-detail.css">
    <title th:text="${productDetail.name}">Product Detail</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<!--    BreadCrumb-->
<div class="breadcrumb-section bg-white py-3 mb-3">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0 bg-transparent p-0">
                <li class="breadcrumb-item">
                    <a th:href="@{'/'}" class="text-primary">Shopee</a>
                </li>
                <th:block th:each="category : ${productDetail.getBreadcrumb()}">
                    <li class="breadcrumb-item">
                        <a th:text="${category.name}" th:href="@{'/c/' + ${category.slug}}" class="text-primary"></a>
                    </li>
                </th:block>
                <li class="breadcrumb-item active" aria-current="page">
                    <span th:text="${productDetail.name}" class="text-muted"></span>
                </li>
            </ol>
        </nav>
    </div>
</div>

<!--    Product details Section-->
<div class="product-details-section bg-white mb-3">
    <div class="container py-4">
        <div class="row">
            <div class="col-lg-5 col-md-6 mb-4">
                <div class="product-images">
                    <div class="main-image mb-2">
                        <img th:if="${productDetail.productImages != null and !#lists.isEmpty(productDetail.productImages)}"
                             th:src="${productDetail.productImages[0].imageUrl}"
                             alt="Product Image"/>
                    </div>
                    <div class="thumbnail-images d-flex flex-wrap">
                        <th:block th:each="img : ${productDetail.productImages}">
                            <div class="thumb-item">
                                <img th:src="${img.getImageUrl()}" class="img-thumbnail" alt="Product Image"/>
                            </div>
                        </th:block>
                        <th:block th:each="imgVariant : ${productDetail.variantImages}">
                            <div class="thumb-item">
                                <img th:src="${imgVariant.getImageUrl()}" class="img-thumbnail" alt="Variant Image"/>
                            </div>
                        </th:block>
                    </div>
                </div>
            </div>
            <div class="col-lg-7 col-md-6">
                <div class="product-info">
                    <div class="badge badge-danger mb-2">Yêu Thích</div>
                    <h1 class="product-title h5 mb-3" th:text="${productDetail.name}"></h1>

                    <div class="product-meta d-flex align-items-center mb-3">
                        <div class="rating mr-3">
                            <span class="text-warning">★</span>
                            <span class="font-weight-bold" th:text="${productDetail.rating}">4.9</span>
                        </div>
                        <div class="divider">|</div>
                        <div class="reviews mx-3">
                            <span th:text="${productDetail.reviewCount}">739</span> Đánh Giá
                        </div>
                        <div class="divider">|</div>
                        <div class="sold ml-3">
                            Đã bán <span th:text="${productDetail.soldCount}">4k+</span>
                        </div>
                    </div>

                    <!-- Hidden data for original price range -->
                    <div class="original-price-range" style="display: none;"
                         th:data-min-price="${productDetail.minPrice}"
                         th:data-max-price="${productDetail.maxPrice}">
                    </div>

                    <div class="price-section bg-light p-3 mb-4">
                        <div class="price-range">
                            <span class="price-symbol">₫</span>
                            <span class="price-min" th:text="${#numbers.formatDecimal(productDetail.minPrice, 0, 'COMMA', 0, 'POINT')}">274,000</span>
                            <span class="mx-2">-</span>
                            <span class="price-max" th:text="${#numbers.formatDecimal(productDetail.maxPrice, 0, 'COMMA', 0, 'POINT')}">429,000</span>
                        </div>
                    </div>

                    <!-- Hidden variants data -->
                    <div style="display: none;">
                        <th:block th:each="variant : ${productDetail.variants}">
                            <div class="variant-data"
                                 th:data-variant-id="${variant.id}"
                                 th:data-variant-price="${variant.price}"
                                 th:data-variant-stock="${variant.stock}"
                                 th:data-variant-sku="${variant.sku}">
                                <th:block th:each="attr : ${variant.attributes}">
                                        <span class="variant-attribute"
                                              th:data-attr-name="${attr.attribute}"
                                              th:data-attr-value="${attr.value}">
                                        </span>
                                </th:block>
                            </div>
                        </th:block>
                    </div>

                    <!-- Form để add to cart -->
                    <form th:action="@{/cart/add}" method="post" id="add-to-cart-form">
                        <div class="attributes-section mb-4">
                            <th:block th:each="attribute : ${productDetail.attributes}">
                                <div class="attribute-group mb-3">
                                    <label class="attribute-label d-block mb-2" th:text="${attribute.name}">Màu Sắc</label>
                                    <div class="attribute-values d-flex flex-wrap">
                                        <th:block th:each="value : ${attribute.values}">
                                            <button type="button"
                                                    class="btn btn-outline-secondary btn-sm mr-2 mb-2 attribute-value-btn"
                                                    th:text="${value.displayName}"
                                                    th:data-attribute-name="${attribute.name}"
                                                    th:data-attribute-value="${value.value}">
                                                Silentium Đen
                                            </button>
                                        </th:block>
                                    </div>
                                </div>
                            </th:block>
                        </div>

                        <div class="quantity-section mb-4">
                            <label class="d-block mb-2">Số Lượng:</label>
                            <div class="quantity-control d-inline-flex align-items-center border">
                                <button type="button" class="btn btn-sm px-3 btn-decrease">-</button>
                                <input type="number" name="quantity" value="1" min="1" class="form-control form-control-sm text-center border-0" style="width: 60px;"/>
                                <button type="button" class="btn btn-sm px-3 btn-increase">+</button>
                            </div>
                        </div>

                        <!-- Hidden input để lưu variantId -->
                        <input type="hidden" name="variantId" id="selected-variant-id" value="" />

                        <div class="action-buttons d-flex">
                            <button type="submit" class="btn btn-outline-danger mr-3 px-4 btn-add-to-cart disabled" disabled>
                                <span class="mr-2">🛒</span> Thêm Vào Giỏ Hàng
                            </button>
                            <button type="button" class="btn btn-danger px-5 btn-buy-now disabled" disabled>Mua Ngay</button>
                        </div>

                        <!-- Report Product Button -->
                        <div class="mt-3">
                            <button type="button" 
                                    class="btn btn-outline-secondary btn-sm d-inline-flex align-items-center"
                                    data-toggle="modal" 
                                    data-target="#reportProductModal"
                                    th:attr="data-product-id=${productDetail.id}, data-product-name=${productDetail.name}"
                                    onclick="setProductInfoFromButton(this)">
                                <span class="mr-1">⚑</span> Báo cáo sản phẩm
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!--    Shop information section-->
<div class="shop-information-section bg-white mb-3">
    <div class="container py-4">
        <div class="row align-items-center">
            <div class="col-md-4 text-center mb-3 mb-md-0">
                <img th:src="${productDetail.shop.logoUrl}" th:alt="${productDetail.shop.shopName}" class="shop-logo rounded-circle mb-2" style="width: 80px; height: 80px; object-fit: cover;"/>
                <h6 class="shop-name font-weight-bold mb-2" th:text="${productDetail.shop.shopName}"></h6>
                <button class="btn btn-outline-danger btn-sm">+ Theo Dõi</button>
            </div>
            <div class="col-md-8">
                <div class="row">
                    <div class="col-6">
                        <div class="shop-stat mb-2">
                            <span class="text-muted">Đánh Giá: </span>
                            <span class="text-danger font-weight-bold ml-2" th:text="${productDetail.shop.rating}">4.8</span>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="shop-stat mb-2">
                            <span class="text-muted">Sản Phẩm:</span>
                            <span class="text-danger font-weight-bold ml-2" th:text="${productDetail.shop.totalProducts}">234</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!--    Product Description-->
<div class="product-description-section bg-white mb-3">
    <div class="container py-4">
        <h5 class="section-title mb-3 bg-light p-3">CHI TIẾT SẢN PHẨM</h5>
        <div class="description-content p-3">
            <p th:text="${productDetail.description}"></p>
        </div>
    </div>
</div>

<!--    Product Review and Reply-->
<div class="review-section bg-white mb-3">
    <div class="container py-4">
        <h5 class="section-title mb-4 bg-light p-3">ĐÁNH GIÁ SẢN PHẨM</h5>
        <div th:if="${productDetail.reviews} != null">
            <th:block th:each="review : ${productDetail.reviews}">
                <div class="review-item p-3 mb-3 border-bottom">
                    <div class="review-header d-flex align-items-center mb-2">
                        <strong class="mr-3" th:text="${review.fullName}">User Name</strong>
                        <span class="text-warning mr-2">
                                <th:block th:each="i : ${#numbers.sequence(1, review.rating)}">★</th:block>
                            </span>
                        <span class="text-muted small" th:text="${review.createdAt}">2024-01-15</span>
                    </div>
                    <p class="review-comment mb-2" th:text="${review.comment}"></p>
                    <div class="review-images d-flex flex-wrap mb-2" th:if="${review.reviewImageUrls} != null">
                        <th:block th:each="img : ${review.reviewImageUrls}">
                            <img th:src="${img.imageUrl}" th:alt="${img.imageType}" class="review-img mr-2 mb-2"/>
                        </th:block>
                    </div>
                    <div class="seller-reply bg-light p-3 mt-2" th:if="${review.reply} != null">
                        <strong class="d-block mb-1 text-danger">Phản Hồi Của Người Bán</strong>
                        <p class="mb-0" th:text="${review.reply.content}"></p>
                    </div>
                </div>
            </th:block>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
<script src="/js/product-detail.js"></script>
<!-- Include Report Product Modal -->
<div th:replace="~{fragments/report_product_modal}"></div>

<script>
    function setProductInfoFromButton(button) {
        setProductInfo(button.dataset.productId, button.dataset.productName);
    }
</script>

</body>
</html>
