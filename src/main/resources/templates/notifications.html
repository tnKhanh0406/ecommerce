<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/style.css">
  <title>Notification</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>
<div class="container py-4">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-lg-3 col-md-4 mb-4">
      <div th:replace="~{fragments/userSidebar ::  userSidebar}"></div>
    </div>

    <!-- Main Content -->
    <div class="col-lg-9 col-md-8">
      <div class="bg-white rounded p-4">
        <h4 class="mb-4 pb-3 border-bottom">Thông Báo</h4>

        <!-- Notification List -->
        <div class="notification-list">
          <th:block th:if="${notifications != null && !notifications.isEmpty()}">
            <th:block th:each="notification :  ${notifications}">
              <a th:href="@{${notification.referenceType.name() == 'ORDER' ? '/user/order/orderDetail/' + notification.referenceId : '#'}}"
                 class="notification-item d-block text-decoration-none mb-3 p-3 border rounded"
                 th:classappend="${notification.isRead ? '' : 'unread'}">
                <div class="d-flex">
                  <div class="notification-icon mr-3">
                    <span th:if="${notification.referenceType. name() == 'ORDER'}" class="badge badge-primary">📦</span>
                    <span th:if="${notification.referenceType.name() == 'PROMOTION'}" class="badge badge-danger">🎉</span>
                    <span th:if="${notification. referenceType.name() != 'ORDER' && notification.referenceType.name() != 'PROMOTION'}" class="badge badge-secondary">📢</span>
                  </div>
                  <div class="flex-grow-1">
                    <h6 class="mb-1 font-weight-bold" th:text="${notification.title}"></h6>
                    <p class="mb-1 text-muted small" th:text="${notification.content}"></p>
                    <p class="mb-0 text-muted" style="font-size: 12px;">
                      <span>🕐</span>
                      <span th:text="${notification.createdAt}"></span>
                    </p>
                  </div>
                  <div class="ml-3">
                    <span th:if="${! notification.isRead}" class="badge badge-danger badge-pill">Mới</span>
                  </div>
                </div>
              </a>
            </th:block>
          </th:block>

          <!-- Empty State -->
          <th:block th:if="${notifications == null || notifications.isEmpty()}">
            <div class="text-center py-5">
              <img src="https://deo.shopeemobile.com/shopee/shopee-pcmall-live-sg/assets/99e561e3944805a023. png"
                   alt="No notifications"
                   style="width: 150px; opacity: 0.5;"/>
              <p class="text-muted mt-3">Không có thông báo nào</p>
            </div>
          </th:block>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
</body>
</html>
