<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="userSidebar">
  <div class="user-sidebar bg-white rounded p-3">
    <div th:if="${currentUser != null}" class="user-information d-flex align-items-center pb-3 mb-3 border-bottom">
      <p class="font-weight-bold mb-0 mr-2" th:text="${currentUser.username}"></p>
    </div>
    <div class="sidebar-menu">
      <!-- Thông báo -->
      <div class="menu-section mb-3">
        <a href="#" class="menu-header d-flex align-items-center text-decoration-none text-dark py-2">
          <span class="menu-icon mr-2">🔔</span>
          <span class="menu-title flex-fill">Thông báo</span>
        </a>
        <div class="menu-items ml-4">
          <a th:href="@{/user/notifications(referenceType=${T(com.prj.ecommerce.common.ReferenceType).VOUCHER})}"
             class="menu-item d-block py-2 text-muted text-decoration-none">Voucher</a>
          <a th:href="@{/user/notifications(referenceType=${T(com.prj.ecommerce.common.ReferenceType).REVIEW})}"
             class="menu-item d-block py-2 text-muted text-decoration-none"> Đánh giá </a>
          <a th:href="@{/user/notifications(referenceType=${T(com.prj.ecommerce.common.ReferenceType).ORDER})}"
             class="menu-item d-block py-2 text-muted text-decoration-none"> Đơn hàng </a>
          <a th:href="@{/user/notifications(referenceType=${T(com.prj.ecommerce.common.ReferenceType).PRODUCT_REPORT})}"
             class="menu-item d-block py-2 text-muted text-decoration-none"> Báo cáo </a>
        </div>
      </div>

      <!-- Tài khoản của tôi -->
      <div class="menu-section mb-3">
        <a href="#" class="menu-header d-flex align-items-center text-decoration-none text-dark py-2">
          <span class="menu-icon mr-2">👤</span>
          <span class="menu-title flex-fill"> Tài khoản của tôi </span>
        </a>
        <div class="menu-items ml-4">
          <a th:href="@{/user/account/profile}" class="menu-item d-block py-2 text-muted text-decoration-none"> Thông tin </a>
          <a th:href="@{/user/account/address}" class="menu-item d-block py-2 text-muted text-decoration-none"> Địa chỉ </a>
          <a th:href="@{/user/account/password}" class="menu-item d-block py-2 text-muted text-decoration-none"> Đổi mật khẩu </a>
        </div>
      </div>

      <!-- Đơn mua -->
      <div class="menu-section mb-3">
        <a th:href="@{/user/order}" class="menu-header d-flex align-items-center text-decoration-none text-dark py-2">
          <span class="menu-icon mr-2">📋</span>
          <span class="menu-title flex-fill"> Đơn hàng </span>
        </a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
