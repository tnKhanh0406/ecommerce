<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min. css">
    <link rel="stylesheet" href="/css/header.css">
</head>
<body>
<header th:fragment="header">
    <!-- Top Bar -->
    <div class="top-bar bg-danger text-white py-1">
        <div class="container">
            <div class="row">
                <div class="col-6">
                    <small>Kênh Người Bán | Trở thành Người Bán Shopee</small>
                </div>
                <div class="col-6 text-right">
                    <small>Kết nối:  Facebook | Instagram</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Header -->
    <div class="main-header bg-danger py-3">
        <div class="container">
            <div class="row align-items-center">
                <!-- Logo -->
                <div class="col-lg-2 col-md-3 col-4">
                    <a th:href="@{/}" class="text-white text-decoration-none">
                        <h3 class="mb-0 font-weight-bold">SHOPEE</h3>
                    </a>
                </div>

                <!-- Search Bar -->
                <div class="col-lg-7 col-md-6 col-8">
                    <form th:action="@{/products}" method="get">
                        <div class="input-group">
                            <input type="text"
                                   name="keyword"
                                   class="form-control"
                                   placeholder="Tìm kiếm sản phẩm..."
                                   th:value="${param.keyword}"/>

                            <input type="hidden"
                                   name="categoryId"
                                   th:if="${currentCategoryId != null}"
                                   th:value="${currentCategoryId}"/>

                            <input type="hidden"
                                   name="shopId"
                                   th:if="${currentShopId != null}"
                                   th:value="${currentShopId}"/>

                            <div class="input-group-append">
                                <button class="btn btn-light" type="submit">
                                    <span>🔍</span> Tìm kiếm
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Right Icons -->
                <div class="col-lg-3 col-md-3 d-none d-md-block">
                    <div class="d-flex justify-content-end align-items-center">
                        <!-- Notifications -->
                        <div class="dropdown mr-3">
                            <a class="text-white text-decoration-none position-relative"
                               href="#"
                               id="notificationDropdown"
                               data-toggle="dropdown">
                                <span class="icon-lg">🔔</span>
                                <span class="notification-text ml-1">Thông báo</span>
                                <span th:if="${notifications != null && notifications.size() > 0}"
                                      class="badge badge-warning badge-pill position-absolute notification-badge">
                                        <span th:text="${notifications.size()}"></span>
                                    </span>
                            </a>
                            <div class="dropdown-menu dropdown-menu-right notification-dropdown"
                                 aria-labelledby="notificationDropdown">
                                <h6 class="dropdown-header">Thông Báo Mới Nhận</h6>
                                <div class="notification-list">
                                    <th:block th:if="${notifications != null && notifications.size() > 0}">
                                        <th:block th:each="notification :  ${notifications}">
                                            <a th:href="@{/user/notifications/order}" class="dropdown-item notification-item">
                                                <div class="notification-content">
                                                    <p class="mb-1 font-weight-bold small" th:text="${notification.title}"></p>
                                                    <p class="mb-1 text-muted small" th:text="${notification.content}"></p>
                                                    <p class="mb-0 text-muted" style="font-size: 11px;" th:text="${notification.createdAt}"></p>
                                                </div>
                                            </a>
                                            <div class="dropdown-divider"></div>
                                        </th:block>
                                    </th:block>
                                        <th:block th:if="${notifications == null || notifications.size() == 0}">
                                            <div class="text-center py-4">
                                                <img src="https://deo.shopeemobile.com/shopee/shopee-pcmall-live-sg/assets/99e561e3944805a023. png"
                                                     alt="No notifications" style="width: 100px; opacity: 0.5;"/>
                                                <p class="text-muted small mb-0">Không có thông báo nào</p>
                                            </div>
                                    </th:block>
                                </div>
                                <a th:href="@{/user/notifications/order}" class="dropdown-item text-center text-primary small">
                                    Xem tất cả
                                </a>
                            </div>
                        </div>

                        <!-- Cart -->
                        <div class="dropdown">
                            <a class="text-white text-decoration-none position-relative"
                               href="#"
                               id="cartDropdown"
                               data-toggle="dropdown">
                                <span class="icon-lg">🛒</span>
                                <span class="notification-text ml-1">Giỏ hàng</span>
                                <span th:if="${cartQuantity != null && cartQuantity > 0}"
                                      class="badge badge-warning badge-pill position-absolute cart-badge">
                                        <span th:text="${cartQuantity}"></span>
                                    </span>
                            </a>
                            <div class="dropdown-menu dropdown-menu-right cart-dropdown"
                                 aria-labelledby="cartDropdown">
                                <h6 class="dropdown-header">Sản Phẩm Mới Thêm</h6>
                                <div class="cart-list">
                                    <th:block th:if="${cartItems != null && cartItems.size() > 0}">
                                        <th:block th:each="item : ${cartItems}">
                                            <div class="dropdown-item cart-item">
                                                <div class="d-flex">
                                                    <img th:src="${item.product.images.get(0).imageUrl}"
                                                         alt="Product"
                                                         class="cart-item-img mr-2"
                                                        style="width: 65px"/>
                                                    <div class="flex-grow-1">
                                                        <p class="mb-1 small" th:text="${item.product.productName}"></p>
                                                        <p class="mb-0 text-danger small font-weight-bold">
                                                            <span class="price-symbol">₫</span>
                                                            <span th:text="${item.product.price}"></span>
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        <div class="dropdown-divider"></div>
                                    </th:block>
                                    </th:block>
                                        <th:block th:if="${cartItems == null || cartItems.size() == 0}">
                                            <div class="text-center py-4">
                                                <p class="text-muted small mb-0">Chưa có sản phẩm</p>
                                            </div>
                                    </th:block>
                                </div>
                                <a th:href="@{/cart}" class="dropdown-item text-center bg-danger text-white">
                                    Xem Giỏ Hàng
                                </a>
                            </div>
                        </div>

                        <!-- User Account -->
                        <div class="dropdown ml-3">
                            <a class="text-white text-decoration-none"
                               href="#"
                               id="userDropdown"
                               data-toggle="dropdown">
                                <span class="icon-lg">👤</span>
                                <span class="notification-text ml-1" th:if="${currentUser != null}" th:text="${currentUser.username}">Tài khoản</span>
                                <span class="notification-text ml-1" th:if="${currentUser == null}">Tài khoản</span>
                            </a>
                            <div class="dropdown-menu dropdown-menu-right"
                                 aria-labelledby="userDropdown">
                                <th:block th:if="${currentUser != null}">
                                    <a th:href="@{/user/account/profile}" class="dropdown-item">
                                        <span>👤</span> Tài khoản của tôi
                                    </a>
                                    <a th:href="@{/user/order}" class="dropdown-item">
                                        <span>📦</span> Đơn mua
                                    </a>
                                    <div class="dropdown-divider"></div>
                                    <a th:href="@{/logout}" class="dropdown-item text-danger">
                                        <span>🚪</span> Đăng xuất
                                    </a>
                                </th:block>
                                <th:block th:if="${currentUser == null}">
                                    <a th:href="@{/login}" class="dropdown-item">
                                        <span>🔑</span> Đăng nhập
                                    </a>
                                    <a th:href="@{/register}" class="dropdown-item">
                                        <span>📝</span> Đăng ký
                                    </a>
                                </th:block>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
