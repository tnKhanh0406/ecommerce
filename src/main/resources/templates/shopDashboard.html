<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <title>Bảng Điều Khiển - Shopee</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <div class="row">
        <div class="col-lg-12">
            <div class="bg-white p-4 rounded">
                <h2 class="font-weight-bold text-danger mb-4">Bảng Điều Khiển Shop</h2>

                <!-- Success Message -->
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${param.success[0]}"></span>
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                </div>

                <!-- Shop Info -->
                <div class="row">
                    <div class="col-md-3">
                        <img th:if="${shop.logoUrl}"
                             th:src="${shop.logoUrl}"
                             alt="Shop Logo"
                             class="img-thumbnail"
                             style="width: 100%; max-width: 200px;">
                    </div>
                    <div class="col-md-9">
                        <h4 th:text="${shop.shopName}">Shop Name</h4>
                        <p class="text-muted" th:text="${shop.description}">Description</p>
                        <a th:href="@{'/shop/' + ${shop.id}}" class="btn btn-sm btn-outline-danger">
                            Xem Shop
                        </a>
                        <a th:href="@{/shop/edit/{shopId}(shopId=${shop.id})}" class="btn btn-sm btn-outline-primary">
                            ✏️ Cập Nhật Thông Tin
                        </a>
                    </div>
                </div>

                <hr>

                <!-- Dashboard Menu -->
                <div class="row mt-4">
                    <div class="col-md-3 col-sm-6">
                        <a th:href="@{'/shop/' + ${shop.id} +'/products'}" class="dashboard-card">
                            <div class="text-center">
                                <h3>📦</h3>
                                <p>Sản Phẩm</p>
                                <small class="text-muted">Quản lý products</small>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <a th:href="@{'/shop/' + ${shop.id} + '/orders'}" class="dashboard-card">
                            <div class="text-center">
                                <h3>📋</h3>
                                <p>Đơn Hàng</p>
                                <small class="text-muted">Quản lý đơn hàng</small>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <a th:href="@{'/shop/' + ${shop.id} + '/vouchers'}" class="dashboard-card">
                            <div class="text-center">
                                <h3>🎟️</h3>
                                <p>Voucher</p>
                                <small class="text-muted">Quản lý khuyến mãi</small>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <a th:href="@{'/shop/' + ${shop.id} + '/reviews'}" class="dashboard-card">
                            <div class="text-center">
                                <h3>💬</h3>
                                <p>Đánh Giá</p>
                                <small class="text-muted">Phản hồi khách hàng</small>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <a th:href="@{'/shop/' + ${shop.id} + '/analytics'}" class="dashboard-card">
                            <div class="text-center">
                                <h3>📊</h3>
                                <p>Thống Kê</p>
                                <small class="text-muted">Xem doanh số</small>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

<style>
    .dashboard-card {
        display: block;
        padding: 20px;
        background: white;
        border: 1px solid #eee;
        border-radius: 8px;
        text-decoration: none;
        color: #333;
        transition: all 0.3s;
        margin-bottom: 20px;
    }

    .dashboard-card:hover {
        border-color: #ee4d2d;
        box-shadow: 0 4px 12px rgba(238, 77, 45, 0.15);
        transform: translateY(-2px);
    }

    .dashboard-card h3 {
        font-size: 32px;
        margin: 10px 0;
    }
</style>
</body>
</html>
