<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>Products</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<div class="shop-information-section bg-white mb-3" th:if="${shop != null}">
    <div class="container py-4">
        <div class="row align-items-center">
            <div class="col-md-4 text-center mb-3 mb-md-0">
                <img th:src="${shop.logoUrl}" th:alt="${shop.shopName}" class="shop-logo rounded-circle mb-2" style="width: 80px; height: 80px; object-fit: cover;"/>
                <h6 class="shop-name font-weight-bold mb-2" th:text="${shop.shopName}"></h6>
                <button class="btn btn-outline-danger btn-sm">+ Theo Dõi</button>
            </div>
            <div class="col-md-8">
                <div class="row">
                    <div class="col-6">
                        <div class="shop-stat mb-2">
                            <span class="text-muted">Đánh Giá: </span>
                            <span class="text-danger font-weight-bold ml-2" th:text="${shop.rating}">4.8</span>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="shop-stat mb-2">
                            <span class="text-muted">Sản Phẩm:</span>
                            <span class="text-danger font-weight-bold ml-2" th:text="${shop.totalProducts}">234</span>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="shop-stat mb-2">
                            <span class="text-muted">Tham gia:</span>
                            <span class="text-danger font-weight-bold ml-2" th:text="${shop.createdAt}">234</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container-fluid my-4">
    <div class="row">
        <div class="col-lg-3 mb-4">
            <div class="bg-white rounded shadow-sm p-3 sticky-top" style="top: 88px;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="font-weight-bold mb-0">Bộ lọc</h5>
                    <span class="badge badge-danger" th:text="${currentCategoryName != null ? currentCategoryName : 'Tất cả'}">Tất cả</span>
                </div>

                <form th:action="@{/products}" method="get">
                    <input type="hidden" name="categoryId" th:value="${currentCategoryId}">
                    <input type="hidden" name="shopId" th:value="${currentShopId}">
                    <input type="hidden" name="page" value="0">
                    <input type="hidden" name="size" th:value="${pageSize}">

                    <div class="form-group">
                        <label class="small font-weight-bold text-muted">Từ khóa</label>
                        <input type="text" class="form-control form-control-sm" name="keyword" placeholder="Tên sản phẩm"
                               th:value="${keyword}">
                    </div>

                    <div class="form-group">
                        <label class="small font-weight-bold text-muted">Giá tối thiểu</label>
                        <input type="number" class="form-control form-control-sm" name="minPrice" min="0" step="1"
                               th:value="${minPrice}">
                    </div>

                    <div class="form-group">
                        <label class="small font-weight-bold text-muted">Giá tối đa</label>
                        <input type="number" class="form-control form-control-sm" name="maxPrice" min="0" step="1"
                               th:value="${maxPrice}">
                    </div>

                    <div class="form-group">
                        <label class="small font-weight-bold text-muted">Sắp xếp</label>
                        <select class="form-control form-control-sm" name="sortType">
                            <option value="NEWEST" th:selected="${currentSortType != null and currentSortType.name() == 'NEWEST'}">Mới nhất</option>
                            <option value="PRICE_ASC" th:selected="${currentSortType != null and currentSortType.name() == 'PRICE_ASC'}">Giá tăng dần</option>
                            <option value="PRICE_DESC" th:selected="${currentSortType != null and currentSortType.name() == 'PRICE_DESC'}">Giá giảm dần</option>
                            <option value="SOLD_DESC" th:selected="${currentSortType != null and currentSortType.name() == 'SOLD_DESC'}">Bán chạy</option>
                            <option value="RATING_DESC" th:selected="${currentSortType != null and currentSortType.name() == 'RATING_DESC'}">Đánh giá cao</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-danger btn-block btn-sm">Áp dụng</button>
                </form>

                <div th:if="${showCategorySidebar}">
                    <hr>

                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="font-weight-bold mb-0" th:text="${sidebarTitle != null ? sidebarTitle : 'Danh mục'}">Danh mục</h6>
                        <a th:href="@{/products(keyword=${keyword}, shopId=${currentShopId}, sortType=${currentSortType}, minPrice=${minPrice}, maxPrice=${maxPrice}, size=${pageSize})}"
                           class="small text-danger">Tất cả</a>
                    </div>

                    <div class="list-group list-group-flush">
                        <a th:each="category : ${sidebarCategories}"
                           th:href="@{/products(categoryId=${category.id}, keyword=${keyword}, shopId=${currentShopId}, sortType=${currentSortType}, minPrice=${minPrice}, maxPrice=${maxPrice}, size=${pageSize})}"
                           class="list-group-item list-group-item-action border-0 rounded mb-1"
                           th:style="${'padding-left:' + (12 + category.level * 16) + 'px'}"
                           th:classappend="${currentCategoryId != null and currentCategoryId == category.id ? ' active bg-danger border-danger text-white' : ''}">
                            <span th:text="${category.name}">Category</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-9">
            <div class="bg-white rounded shadow-sm p-3 p-md-4 mb-3">
                <div class="d-flex justify-content-between align-items-center flex-wrap">
                    <div>
                        <h4 class="font-weight-bold mb-1" th:text="${currentCategoryName != null ? currentCategoryName : 'Tất cả sản phẩm'}">Tất cả sản phẩm</h4>
                        <p class="text-muted mb-0">
                            <span th:text="${products.totalElements}">0</span> sản phẩm phù hợp
                        </p>
                    </div>
                    <div class="mt-3 mt-md-0">
                        <form th:action="@{/products}" method="get" class="form-inline">
                            <input type="hidden" name="categoryId" th:value="${currentCategoryId}">
                            <input type="hidden" name="shopId" th:value="${currentShopId}">
                            <input type="hidden" name="keyword" th:value="${keyword}">
                            <input type="hidden" name="minPrice" th:value="${minPrice}">
                            <input type="hidden" name="maxPrice" th:value="${maxPrice}">
                            <input type="hidden" name="sortType" th:value="${currentSortType}">
                            <label class="small text-muted mr-2 mb-0">Số lượng hiển thị</label>
                            <select class="form-control form-control-sm mr-2" name="size">
                                <option value="12" th:selected="${pageSize == 12}">12</option>
                                <option value="20" th:selected="${pageSize == 20}">20</option>
                                <option value="40" th:selected="${pageSize == 40}">40</option>
                            </select>
                            <button class="btn btn-outline-danger btn-sm" type="submit">Áp dụng</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="row">
                <th:block th:if="${products != null and products.hasContent()}">
                    <th:block th:each="product : ${products.content}">
                        <div class="col-6 col-sm-4 col-lg-3 mb-3">
                            <th:block th:replace="~{fragments/product :: productCard(${product})}"/>
                        </div>
                    </th:block>
                </th:block>
            </div>

            <div th:if="${products == null or !products.hasContent()}" class="bg-white rounded shadow-sm p-5 text-center">
                <h5 class="mb-2">Không có sản phẩm phù hợp</h5>
                <p class="text-muted mb-0">Hãy thử đổi danh mục, từ khóa hoặc bộ lọc giá.</p>
            </div>

            <nav th:if="${totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center flex-wrap">
                    <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/products(page=0, size=${pageSize}, keyword=${keyword}, categoryId=${currentCategoryId}, shopId=${currentShopId}, sortType=${currentSortType}, minPrice=${minPrice}, maxPrice=${maxPrice})}">Đầu</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/products(page=${currentPage - 1}, size=${pageSize}, keyword=${keyword}, categoryId=${currentCategoryId}, shopId=${currentShopId}, sortType=${currentSortType}, minPrice=${minPrice}, maxPrice=${maxPrice})}">Trước</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage ? 'active' : ''}">
                        <a class="page-link" th:href="@{/products(page=${i}, size=${pageSize}, keyword=${keyword}, categoryId=${currentCategoryId}, shopId=${currentShopId}, sortType=${currentSortType}, minPrice=${minPrice}, maxPrice=${maxPrice})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/products(page=${currentPage + 1}, size=${pageSize}, keyword=${keyword}, categoryId=${currentCategoryId}, shopId=${currentShopId}, sortType=${currentSortType}, minPrice=${minPrice}, maxPrice=${maxPrice})}">Sau</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/products(page=${totalPages - 1}, size=${pageSize}, keyword=${keyword}, categoryId=${currentCategoryId}, shopId=${currentShopId}, sortType=${currentSortType}, minPrice=${minPrice}, maxPrice=${maxPrice})}">Cuối</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
</body>
</html>
