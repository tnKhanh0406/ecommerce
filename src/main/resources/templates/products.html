<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css">
    <title>Products</title>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="shop-information-section bg-white mb-3" th:if="${shop != null}">
    <div class="container py-4">
        <div class="row align-items-center">
            <div class="col-md-4 text-center mb-3 mb-md-0">
                <img th:src="${shop.logoUrl}" th:alt="${shop.shopName}" class="shop-logo rounded-circle mb-2" style="width: 80px; height: 80px; object-fit: cover;"/>
                <h6 class="shop-name font-weight-bold mb-2" th:text="${shop.shopName}"></h6>
                <button class="btn btn-outline-danger btn-sm">+ Theo Dõi</button>
            </div>
            <div class="col-md-8">
                <div class="row">
                    <div class="col-6">
                        <div class="shop-stat mb-2">
                            <span class="text-muted">Đánh Giá: </span>
                            <span class="text-danger font-weight-bold ml-2" th:text="${shop.rating}">4.8</span>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="shop-stat mb-2">
                            <span class="text-muted">Sản Phẩm:</span>
                            <span class="text-danger font-weight-bold ml-2" th:text="${shop.totalProducts}">234</span>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="shop-stat mb-2">
                            <span class="text-muted">Tham gia:</span>
                            <span class="text-danger font-weight-bold ml-2" th:text="${shop.createdAt}">234</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="recommend-product-section bg-white py-4 mb-4">
    <div class="container">
        <div class="row">
            <th:block th:each="product : ${products.getContent()}">
                <div class="col-6 col-sm-4 col-md-3 col-lg-2 mb-3">
                    <th:block th:replace="~{fragments/product :: productCard(${product})}"/>
                </div>
            </th:block>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
</body>
</html>
