<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css">
    <title>Change Password</title>
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-lg-3 col-md-4 mb-4">
            <div th:replace="~{fragments/userSidebar ::  userSidebar}"></div>
        </div>

        <!-- Main Content -->
        <div class="col-lg-9 col-md-8">
            <div class="user-profile bg-white rounded p-4">
                <div class="profile-header border-bottom pb-3 mb-4">
                    <h4 class="mb-2">Đổi Mật Khẩu</h4>
                    <p class="text-muted small mb-0">Để bảo mật tài khoản, vui lòng không chia sẻ mật khẩu cho người khác</p>
                </div>

                <form th:action="@{/user/account/password/change-password}" th:object="${password}" method="post">
                <div class="form-group row">
                        <label for="password" class="col-sm-3 col-form-label text-right text-muted">Mật khẩu hiện tại</label>
                        <div class="col-sm-9">
                            <input type="password" id="password" class="form-control" th:field="*{password}"/>
                            <small class="form-text text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="newPassword" class="col-sm-3 col-form-label text-right text-muted">Mật khẩu mới</label>
                        <div class="col-sm-9">
                            <input type="password" id="newPassword" class="form-control" th:field="*{newPassword}"/>
                            <small class="form-text text-danger" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></small>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-9 offset-sm-3">
                            <button type="submit" class="btn btn-danger px-5">Xác Nhận</button>
                        </div>
                    </div>
                </form>
                <div th:if="${success}" class="alert alert-success">
                    <p th:text="${success}"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim. min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
</body>
</html>
