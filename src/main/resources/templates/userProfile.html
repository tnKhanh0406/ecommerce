<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css">
    <title>User Profile</title>
</head>
    <body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container py-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-3 col-md-4 mb-4">
                <div th:replace="~{fragments/userSidebar :: userSidebar}"></div>
            </div>

            <!-- Main Content -->
            <div class="col-lg-9 col-md-8">
                <div class="user-profile bg-white rounded p-4">
                    <div class="profile-header border-bottom pb-3 mb-4">
                        <h4 class="mb-2">Hồ Sơ Của Tôi</h4>
                        <p class="text-muted small mb-0">Quản lý thông tin hồ sơ để bảo mật tài khoản</p>
                    </div>

                    <form th:action="@{/user/account/profile/update}" th:object="${profile}" method="post">
                        <div class="form-group row align-items-center">
                            <label for="username" class="col-sm-3 col-form-label text-right text-muted">Tên đăng nhập</label>
                            <div class="col-sm-9">
                                <p id="username" class="form-control-plaintext mb-0" th:text="${currentUser.username}"></p>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label for="fullName" class="col-sm-3 col-form-label text-right text-muted">Tên</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" id="fullName" th:field="*{fullName}"/>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label for="email" class="col-sm-3 col-form-label text-right text-muted">Email</label>
                            <div class="col-sm-9">
                                <input type="email" class="form-control" id="email" th:field="*{email}"/>
                                <small class="form-text text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label for="phoneNumber" class="col-sm-3 col-form-label text-right text-muted">Số điện thoại</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" id="phoneNumber" th:field="*{phoneNumber}"/>
                                <small class="form-text text-danger" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></small>
                            </div>
                        </div>

                        <div class="form-group row">
                            <div class="col-sm-9 offset-sm-3">
                                <button type="submit" class="btn btn-danger px-5">Lưu</button>
                            </div>
                        </div>
                    </form>

                    <div th:if="${success}" class="alert alert-success mt-3" role="alert">
                        <p class="mb-0" th:text="${success}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
</body>
</html>
