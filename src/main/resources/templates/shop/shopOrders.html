<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>Quản Lý Đơn Hàng - Seller</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>

    <div class="bg-white rounded p-4 mb-4">
        <div class="d-flex justify-content-between align-items-center flex-wrap">
            <div>
                <h2 class="font-weight-bold text-danger mb-1">📋 Quản Lý Đơn Hàng</h2>
                <p class="text-muted mb-0" th:text="${shop.shopName}">Shop name</p>
            </div>
            <a th:href="@{/shop/dashboard}" class="btn btn-outline-secondary mt-3 mt-md-0">← Về Dashboard</a>
        </div>

        <div class="mt-4">
            <a th:href="@{'/shop/' + ${shop.id} + '/orders'}" class="btn btn-sm mr-2" th:classappend="${currentStatus == null ? 'btn-danger' : 'btn-outline-danger'}">Tất cả</a>
            <a th:href="@{'/shop/' + ${shop.id} + '/orders'(status=${T(com.prj.ecommerce.common.OrderStatus).PENDING})}" class="btn btn-sm mr-2" th:classappend="${currentStatus != null and currentStatus.name() == 'PENDING' ? 'btn-danger' : 'btn-outline-danger'}">PENDING</a>
            <a th:href="@{'/shop/' + ${shop.id} + '/orders'(status=${T(com.prj.ecommerce.common.OrderStatus).CONFIRMED})}" class="btn btn-sm mr-2" th:classappend="${currentStatus != null and currentStatus.name() == 'CONFIRMED' ? 'btn-danger' : 'btn-outline-danger'}">CONFIRMED</a>
            <a th:href="@{'/shop/' + ${shop.id} + '/orders'(status=${T(com.prj.ecommerce.common.OrderStatus).SHIPPING})}" class="btn btn-sm mr-2" th:classappend="${currentStatus != null and currentStatus.name() == 'SHIPPING' ? 'btn-danger' : 'btn-outline-danger'}">SHIPPING</a>
            <a th:href="@{'/shop/' + ${shop.id} + '/orders'(status=${T(com.prj.ecommerce.common.OrderStatus).COMPLETED})}" class="btn btn-sm mr-2" th:classappend="${currentStatus != null and currentStatus.name() == 'COMPLETED' ? 'btn-danger' : 'btn-outline-danger'}">COMPLETED</a>
        </div>
    </div>

    <div th:if="${orders == null or #lists.isEmpty(orders)}" class="bg-white rounded p-5 text-center">
        <h5 class="mb-2">Chưa có đơn hàng</h5>
        <p class="text-muted mb-0">Các đơn hàng của shop sẽ hiển thị ở đây.</p>
    </div>

    <th:block th:each="order : ${orders}">
        <div class="card mb-3 shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center flex-wrap">
                <div>
                    <strong>Đơn #<span th:text="${order.id}"></span></strong>
                    <span class="text-muted ml-2" th:text="${order.receiverName}"></span>
                </div>
                <div class="d-flex align-items-center mt-2 mt-md-0">
                    <span class="badge badge-pill mr-3"
                          th:classappend="${order.orderStatus == 'PENDING' ? 'badge-warning' : (order.orderStatus == 'CONFIRMED' ? 'badge-info' : (order.orderStatus == 'SHIPPING' ? 'badge-primary' : (order.orderStatus == 'COMPLETED' ? 'badge-success' : 'badge-danger')))}"
                          th:text="${order.orderStatus}"></span>
                    <a th:href="@{'/user/order/orderDetail/' + ${order.id}}" class="btn btn-sm btn-outline-secondary">Xem chi tiết</a>
                </div>
            </div>

            <div class="card-body">
                <div class="row">
                    <div class="col-lg-8">
                        <div th:each="item : ${order.items}" class="d-flex align-items-center mb-3 pb-3 border-bottom">
                            <img th:src="${item.imageUrl}" alt="item" style="width:64px;height:64px;object-fit:cover;border-radius:8px;" class="mr-3"/>
                            <div class="flex-grow-1">
                                <div class="font-weight-bold" th:text="${item.productName}"></div>
                                <div class="text-muted small" th:text="${item.productVariantName}"></div>
                                <div class="text-muted small" th:text="'Số lượng: x' + ${item.quantity}"></div>
                            </div>
                            <div class="text-right font-weight-bold" th:text="'₫' + ${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}"></div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="bg-light rounded p-3 mb-3">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Thanh toán</span>
                                <span th:text="${order.paymentStatus}"></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Tổng tiền</span>
                                <strong th:text="'₫' + ${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')}"></strong>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Khách hàng</span>
                                <span th:text="${order.receiverName}"></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Ngày tạo</span>
                                <span th:text="${order.createdAt}"></span>
                            </div>
                        </div>

                        <form th:if="${order.orderStatus != 'COMPLETED' and order.orderStatus != 'CANCELLED'}"
                              th:action="@{'/shop/' + ${shop.id} + '/orders/' + ${order.id} + '/status'}"
                              method="post"
                              class="bg-white border rounded p-3">
                            <label class="font-weight-bold">Cập nhật trạng thái</label>
                            <select name="status" class="form-control mb-3">
                                <option th:selected="${order.orderStatus == 'PENDING'}" value="PENDING">PENDING</option>
                                <option th:selected="${order.orderStatus == 'CONFIRMED'}" value="CONFIRMED">CONFIRMED</option>
                                <option th:selected="${order.orderStatus == 'SHIPPING'}" value="SHIPPING">SHIPPING</option>
                                <option th:selected="${order.orderStatus == 'COMPLETED'}" value="COMPLETED">COMPLETED</option>
                            </select>
                            <button type="submit" class="btn btn-danger btn-block">Lưu trạng thái</button>
                            <small class="text-muted d-block mt-2">Đơn đã completed sẽ không chỉnh sửa được.</small>
                        </form>

                        <div th:if="${order.orderStatus == 'COMPLETED'}" class="alert alert-success mb-0">
                            Đơn đã hoàn tất, không thể thay đổi trạng thái.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </th:block>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
