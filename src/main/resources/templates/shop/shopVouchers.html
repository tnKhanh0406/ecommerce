<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <title>Quản Lý Voucher</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="font-weight-bold text-danger mb-1">🎟️ Quản Lý Voucher</h2>
            <p class="text-muted mb-0" th:text="${shop.shopName}">Shop</p>
        </div>
        <a th:href="@{/shop/dashboard}" class="btn btn-outline-secondary">← Về Dashboard</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>

    <div class="card mb-4">
        <div class="card-header bg-white">
            <h5 class="mb-0">Tạo Voucher Mới</h5>
        </div>
        <div class="card-body">
            <form th:action="@{'/shop/' + ${shop.id} + '/vouchers/create'}" method="post">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Mã voucher</label>
                        <input type="text" name="code" class="form-control" placeholder="VD: SALE10" required>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Loại giảm giá</label>
                        <select name="discountType" class="form-control" required>
                            <option th:each="type : ${discountTypes}" th:value="${type}" th:text="${type}"></option>
                        </select>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Giá trị giảm</label>
                        <input type="number" name="discountValue" class="form-control" step="0.01" min="0" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Giảm tối đa</label>
                        <input type="number" name="maxDiscount" class="form-control" step="0.01" min="0" required>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Đơn tối thiểu</label>
                        <input type="number" name="minOrderValue" class="form-control" step="0.01" min="0" required>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Số lượt dùng</label>
                        <input type="number" name="usageLimit" class="form-control" min="1" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Bắt đầu</label>
                        <input type="datetime-local" name="startAt" class="form-control" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label>Kết thúc</label>
                        <input type="datetime-local" name="endAt" class="form-control" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-danger">Tạo voucher</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-white">
            <h5 class="mb-0">Danh Sách Voucher</h5>
        </div>
        <div class="card-body p-0">
            <div th:if="${vouchers == null or #lists.isEmpty(vouchers)}" class="p-4 text-center text-muted">
                Chưa có voucher nào.
            </div>
            <div th:if="${vouchers != null and !#lists.isEmpty(vouchers)}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="thead-light">
                    <tr>
                        <th>Mã</th>
                        <th>Loại</th>
                        <th>Giá trị</th>
                        <th>Giới hạn</th>
                        <th>Hiệu lực</th>
                        <th>Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="voucher : ${vouchers}">
                        <td class="font-weight-bold" th:text="${voucher.code}"></td>
                        <td th:text="${voucher.discountType}"></td>
                        <td>
                            <span th:if="${voucher.discountType.name() == 'PERCENT'}" th:text="${voucher.discountValue} + '%'">10%</span>
                            <span th:if="${voucher.discountType.name() == 'FIXED'}" th:text="'₫' + ${#numbers.formatDecimal(voucher.discountValue, 0, 'COMMA', 0, 'POINT')}">10000</span>
                        </td>
                        <td th:text="${voucher.usedCount} + '/' + ${voucher.usageLimit}"></td>
                        <td>
                            <small class="d-block" th:text="'Từ: ' + ${#temporals.format(voucher.startAt, 'dd/MM/yyyy HH:mm')}"></small>
                            <small class="d-block" th:text="'Đến: ' + ${#temporals.format(voucher.endAt, 'dd/MM/yyyy HH:mm')}"></small>
                        </td>
                        <td>
                            <button type="button" class="btn btn-sm btn-outline-primary" data-toggle="modal" th:data-target="'#editVoucherModal' + ${voucher.id}">Sửa</button>
                            <form th:action="@{'/shop/' + ${shop.id} + '/vouchers/' + ${voucher.id} + '/delete'}" method="post" class="d-inline" onsubmit="return confirm('Bạn chắc chắn muốn xóa voucher này?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Xóa</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<th:block th:each="voucher : ${vouchers}">
    <div class="modal fade" th:id="'editVoucherModal' + ${voucher.id}" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <form th:action="@{'/shop/' + ${shop.id} + '/vouchers/' + ${voucher.id} + '/update'}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">Cập nhật voucher</h5>
                        <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                    </div>
                    <div class="modal-body">
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>Mã voucher</label>
                                <input type="text" name="code" class="form-control" th:value="${voucher.code}" required>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Loại giảm giá</label>
                                <select name="discountType" class="form-control" required>
                                    <option th:each="type : ${discountTypes}" th:value="${type}" th:selected="${voucher.discountType == type}" th:text="${type}"></option>
                                </select>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Giá trị giảm</label>
                                <input type="number" name="discountValue" class="form-control" step="0.01" min="0" th:value="${voucher.discountValue}" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>Giảm tối đa</label>
                                <input type="number" name="maxDiscount" class="form-control" step="0.01" min="0" th:value="${voucher.maxDiscount}" required>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Đơn tối thiểu</label>
                                <input type="number" name="minOrderValue" class="form-control" step="0.01" min="0" th:value="${voucher.minOrderValue}" required>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Số lượt dùng</label>
                                <input type="number" name="usageLimit" class="form-control" min="1" th:value="${voucher.usageLimit}" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Bắt đầu</label>
                                <input type="datetime-local" name="startAt" class="form-control" th:value="${#temporals.format(voucher.startAt, 'yyyy-MM-dd''T''HH:mm')}" required>
                            </div>
                            <div class="form-group col-md-6">
                                <label>Kết thúc</label>
                                <input type="datetime-local" name="endAt" class="form-control" th:value="${#temporals.format(voucher.endAt, 'yyyy-MM-dd''T''HH:mm')}" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-danger">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
